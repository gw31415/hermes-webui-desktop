<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes WebUI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }

    #loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 100vw; height: 100vh; color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      gap: 24px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 15px; opacity: 0.7; }
    #loading .error { color: #ef4444; font-size: 13px; max-width: 400px; text-align: center; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading Hermes WebUI…</p>
    <p class="error" id="err"></p>
  </div>

  <script>
    // The Rust backend already spawned the Python server and verified
    // /health before this page is shown (setup() blocks on wait_for_health).
    // We just get the URL via IPC and navigate the webview to it directly.
    //
    // We use window.location.replace() instead of an iframe because:
    //   1. The WebUI sends X-Frame-Options: DENY + CSP frame-ancestors 'none'
    //   2. Top-level navigation is never blocked by CORS or frame policies
    //   3. The webview becomes the WebUI itself — full functionality

    const { invoke } = window.__TAURI__.core;
    const errEl = document.getElementById('err');

    async function init() {
      try {
        const url = await invoke('get_server_url');
        // Navigate the webview to the WebUI server.
        // replace() avoids leaving the loading page in history.
        window.location.replace(url);
      } catch (e) {
        document.querySelector('.spinner').style.display = 'none';
        document.querySelector('#loading p').textContent = 'Failed to start Hermes WebUI';
        errEl.textContent = String(e) + '. Ensure ~/hermes-webui exists and Python is installed.';
      }
    }

    init();
  </script>
</body>
</html>
